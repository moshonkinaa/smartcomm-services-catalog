schema_version: 1
id: uptime-kuma
name: Uptime Kuma
tagline: Мониторинг доступности всего в доме (с алертами в Telegram)
category: smart-home
icon: activity
client_facing: true
suspicious: false

requirements:
  min_ram_mb: 256
  min_disk_gb: 1
  platforms: [x86_64, arm64]
  cpu_cores: 1
  needs_internet: true
  needs_ports: [3001]
  optional_ports: []

description: |
  Self-hosted мониторинг доступности (HTTP / HTTPS / TCP / Ping / DNS) с
  красивым dashboard и алертами в Telegram, Email, Discord, Slack, Webhook.

  **Зачем в 2026**:
  - Алерт «офисный принтер недоступен 5 минут» в Telegram семьи
  - «Интернет провайдера упал» (ping 8.8.8.8) → SMS жене
  - «iRidium server down» → инсталлятору сразу видно
  - Status page для клиента — может посмотреть «всё ли работает» через QR
  - Бесплатная альтернатива UptimeRobot (5 проверок) / Datadog ($15+/мес)

features:
  - "10+ типов проверок: HTTP, HTTPS, TCP, Ping, DNS, Docker, Push, Steam, Kafka"
  - 90+ типов уведомлений (Telegram, Email, Slack, etc.)
  - Status page (публичный или приватный) — можно поделиться с клиентом
  - Maintenance windows (запланированные простои не считаются)
  - Telegram-бот для управления алертами

web_url: "http://{CONTROLLER}:3001"
docs_url: https://github.com/louislam/uptime-kuma/wiki

post_install: |
  1. Открой http://CONTROLLER:3001
  2. Создай админ-аккаунт
  3. Add New Monitor:
     - Type: HTTP, Name: «iRidium server», URL: http://localhost:8888
     - Type: Ping, Name: «Шлюз», URL: 192.168.101.1
     - Type: HTTP, Name: «Дашборд», URL: http://localhost:8080/login
  4. Settings → Notifications → добавь Telegram bot
  5. Назначь Notifications на мониторы

compose: |
  services:
    uptime-kuma:
      image: louislam/uptime-kuma:1
      container_name: uptime-kuma
      restart: unless-stopped
      ports:
        - "3001:3001"
      volumes:
        - "{DATA}/data:/app/data"
      environment:
        - "TZ=Europe/Moscow"
